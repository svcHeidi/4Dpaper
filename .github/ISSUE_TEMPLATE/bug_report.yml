name: Bug report
description: Report a reproducible problem in a supported workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private papers, or confidential datasets.
  - type: input
    id: version
    attributes:
      label: 4Dpapers version or image tag
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, CPU architecture, browser, and Docker version.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give the smallest complete sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets, private paths, and unpublished data.
          required: true
        - label: This is not a security vulnerability.
          required: true
