name: PR Regressions

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pr-regressions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  regressions:
    name: Run tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-e2e.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-e2e.txt

      - name: Run tests
        run: |
          python -m pytest -q
