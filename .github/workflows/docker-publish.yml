name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"       # e.g. v1.2.3
  pull_request:
    branches:
      - main           # build-only (no push) for PRs
  workflow_dispatch:   # manual trigger from the Actions tab

# Ensure only one publish workflow runs at a time for the same ref
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. yourname/4dpapers

jobs:
  build-and-push:
    name: Build & push multi-platform image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Read version from VERSION file ──────────────────────────────────
      - name: Read VERSION
        id: version
        run: |
          APP_VERSION=$(cat VERSION)
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $APP_VERSION"

      # ── 3. Validate git tag matches VERSION (release pushes only) ───────────
      - name: Validate tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FILE_VER="${{ steps.version.outputs.app_version }}"
          if [ "$TAG" != "$FILE_VER" ]; then
            echo "ERROR: git tag v$TAG does not match VERSION file ($FILE_VER)"
            exit 1
          fi
          echo "Tag and VERSION match: $FILE_VER"

      # ── 4. Set up QEMU (for cross-platform builds) ─────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 5. Set up Docker Buildx ────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 6. Log in to GitHub Container Registry ─────────────────────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Extract Docker metadata (tags + labels) ─────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      # ── 8. Build (+ push if not a PR) ──────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 9. Print image digest for audit trail ──────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Published ${{ steps.meta.outputs.tags }}"
