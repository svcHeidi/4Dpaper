<!-- viewer_controls.html -->
<div id="cs-strip" class="fourd-strip">
  <!-- Buttons injected by 4dpaper.py if needed, or generated by logic -->
</div>

<div id="cs-lock-shield" class="fourd-lock-shield" style="display:none;"></div>

<div id="cs-lock-widget" class="fourd-lock-widget" title="Lock / unlock figure">🔓</div>

<div id="cs-lock-badge" class="fourd-lock-badge" style="display:none;">locked</div>

<!-- Popups -->
<div id="cs-pop-field" class="fourd-popup" style="display:none;">
    <div class="fourd-popup-header">Field Projection</div>
    <div class="fourd-control-group">
      <select id="cs-field-sel" class="fourd-select"></select>
    </div>
    <div id="cs-field-badge" class="fourd-status-badge" style="display:none;"></div>
</div>

<div id="cs-pop-time" class="fourd-popup" style="display:none;">
    <div class="fourd-popup-header">
      <span>Time Step</span>
      <span class="fourd-time-meta"><span id="cs-time-idx">0</span>/<span id="cs-time-max">0</span></span>
    </div>
    <div class="fourd-time-display">t = <span id="cs-time-val">0.0</span></div>
    <div class="fourd-control-group">
      <input type="range" id="cs-time-slider" class="fourd-slider" min="0" max="0" value="0">
    </div>
</div>

<div id="cs-corner" class="fourd-corner-widget">
  <svg id="cs-svg-axes" class="fourd-axes-svg" width="56" height="56" title="Click axis tip for ortho view"></svg>
  <span id="cs-iso-flash" class="fourd-flash-text"></span>
</div>
