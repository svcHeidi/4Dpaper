services:
  4dpapers:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5006:5006"  # Dashboard UI
    volumes:
      - .:/workspace  # Mounts current directory as the project
      # Mount your data directory so shortcuts can resolve to it inside the container.
      # Example: - /path/to/your/data:/data
    environment:
      - PORT=5006
      - PYTHONUNBUFFERED=1
      - PROJECT_ROOT=/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Uncomment to enable GPU support (for PyVista rendering):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
