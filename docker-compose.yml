services:
  4dpapers:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5006:5006"  # Dashboard UI
    volumes:
      - .:/workspace  # Mounts current directory as the project
      # Mount your data directory so shortcuts can resolve to it inside the container.
      # Example: - /path/to/your/data:/data
      # Optional: mount signing keys read-only and set FOURD_SIGNING_* env vars.
      # Example host dir: /absolute/host/path/4dpapers-keys
      - ${FOURD_SIGNING_KEYS_HOST_DIR:-/private/tmp/4dpapers-no-signing}:/run/secrets/4dpapers:ro
    environment:
      - PORT=5006
      - PYTHONUNBUFFERED=1
      - PROJECT_ROOT=/workspace
      - FOURD_SIGNING_PRIVATE_KEY_PATH=${FOURD_SIGNING_PRIVATE_KEY_PATH:-}
      - FOURD_SIGNING_PUBLIC_KEY_PATH=${FOURD_SIGNING_PUBLIC_KEY_PATH:-}
      - FOURD_SIGNING_KEY_ID=${FOURD_SIGNING_KEY_ID:-default}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # Uncomment to enable GPU support (for PyVista rendering):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
