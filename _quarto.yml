project:
  title: "4D Paper — OpenFOAM Analysis"
  type: default
  output-dir: _output

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-location: left
    code-fold: true
    code-tools: true
    code-line-numbers: true
    self-contained: true
    embed-resources: true
    smooth-scroll: true
    number-sections: true
    fig-responsive: true
    fontsize: 1rem
    mainfont: "Inter, system-ui, sans-serif"

execute:
  echo: true
  warning: false
  freeze: auto

# Python environment
jupyter: python3
